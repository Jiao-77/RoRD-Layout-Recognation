[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# 默认命令行选项
addopts = -v --tb=short

# Python 文件模式
python_files = test_*.py *_test.py

# Python 类模式
python_classes = Test*

# Python 函数模式
python_functions = test_*

# 最小版本
minversion = 7.0

# 标记
markers =
    slow: 慢速测试
    cuda: 需要 CUDA 的测试
    integration: 集成测试

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# 日志配置
log_cli = false
log_cli_level = INFO